services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
    environment:
      - DB_DRIVER=postgres
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=dvorfs
      - DB_PORT=5432
      - ARTIFACT_STORAGE_DIR=/var/lib/dvorfs/artifacts
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_EMAIL=admin@local
    ports:
      - "8080:8080"
    volumes:
      - artifact_data:/var/lib/dvorfs/artifacts
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:13-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dvorfs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dvorfs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  artifact_data:
  postgres_data:
